services:
  web:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      # watchpack polling ayuda con el hot reload dentro de Docker Desktop a veces en Windows/Mac
      - WATCHPACK_POLLING=true
